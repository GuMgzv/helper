<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Угадай число — лягушка и аист</title>
<style>
  :root{
    --ink:#1d2433; --paper:#eaf4f1; --card:#ffffff;
    --coral:#ff6b5e; --coral-soft:#ffe7e3;
    --mint:#2bb673; --mint-soft:#e2f6ec;
    --sky:#3a7bd5; --sky-soft:#e6effb;
    --muted:#8b93a4; --line:#dde6e2;
    --frog:#5bbf57; --frog-dark:#3f9e3c;
    --water:#cfe8df; --pad:#9cd3a8;
    --stork:#ffffff; --stork-line:#d7dde6; --beak:#ff8a3d; --leg:#ff6b5e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--paper);color:var(--ink);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:480px;background:var(--card);
    border:1px solid var(--line);border-radius:24px;padding:28px 26px;
    box-shadow:0 18px 40px -24px rgba(29,36,51,.4);overflow:hidden}
  .eyebrow{font-size:13px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);font-weight:600}
  h1{font-size:28px;line-height:1.15;margin:6px 0 4px;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:15px;margin-bottom:16px}

  /* ===== сцена ===== */
  .scene{position:relative;height:230px;margin-bottom:16px;
    border-radius:18px;overflow:hidden;
    background:linear-gradient(180deg,#dff0fb 0%,#eaf6fc 55%,var(--water) 55%,var(--water) 100%)}
  .cloud{position:absolute;background:#fff;border-radius:999px;opacity:.8}
  .cloud.c1{width:54px;height:18px;top:18px;left:30px}
  .cloud.c2{width:40px;height:14px;top:38px;right:40px}
  .lily{position:absolute;z-index:1;pointer-events:none}
  .lily svg{display:block}

  /* дорожка чисел = берег у воды */
  .track{position:absolute;left:8px;right:8px;bottom:30px;height:6px;
    border-radius:999px;background:var(--pad);opacity:.5}
  .zone{position:absolute;bottom:30px;height:6px;border-radius:999px;
    background:var(--mint);
    transition:left .45s ease,width .45s ease}
  .ends{position:absolute;left:8px;right:8px;bottom:8px;
    display:flex;justify-content:space-between;
    font-size:12px;color:var(--muted);font-weight:600}

  /* лягушка */
  .frog-wrap{position:absolute;bottom:30px;left:50%;
    transform:translateX(-50%);transition:left .5s cubic-bezier(.34,1.2,.64,1);z-index:2}
  .frog-hop{transform:translateY(0)}
  .frog-hop.hopping{animation:hop .5s ease}
  @keyframes hop{0%{transform:translateY(0)}40%{transform:translateY(-46px)}100%{transform:translateY(0)}}
  .frog-face{display:block;transition:transform .2s}
  .frog-face.left{transform:scaleX(-1)}
  .frog svg, .frog-face svg{display:block}
  .frog-svg{width:60px;height:60px}
  .frog-hop.gulped{animation:gulp .5s ease forwards}
  @keyframes gulp{to{transform:scale(.1) translateY(10px);opacity:0}}
  .eye-lid{transform-origin:center;animation:blink 4.5s infinite}
  @keyframes blink{0%,93%,100%{transform:scaleY(0)}96%{transform:scaleY(1)}}

  /* аист */
  .stork-wrap{position:absolute;left:50%;top:4%;
    transform:translateX(-50%);
    transition:left .5s ease,top .5s ease;z-index:3}
  .stork-bob{animation:bob 2.2s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
  .stork-svg{width:78px;height:64px;display:block}
  .wing{transform-origin:54px 40px;animation:flap 1.1s ease-in-out infinite}
  @keyframes flap{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-22deg)}}
  .stork-wrap.diving{transition:left .35s ease,top .35s ease}
  .stork-bob.dive{animation:dive .5s ease forwards}
  @keyframes dive{0%{transform:rotate(0)}100%{transform:rotate(35deg) translateY(20px)}}
  .stork-wrap.flyaway{transition:left 1.1s ease,top 1.1s ease,opacity 1.1s ease}

  .heart,.tear{position:absolute;pointer-events:none;font-size:18px}
  .heart{animation:floatUp 1s ease forwards}
  @keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-50px);opacity:0}}
  .tear{font-size:14px;animation:tearFall .9s ease infinite}
  @keyframes tearFall{0%{transform:translateY(0);opacity:.9}100%{transform:translateY(16px);opacity:0}}

  /* ===== управление ===== */
  .input-row{display:flex;gap:10px;margin-bottom:12px}
  input{flex:1;min-width:0;font-size:22px;font-weight:600;text-align:center;
    padding:14px;border:2px solid var(--line);border-radius:14px;
    color:var(--ink);background:var(--paper);transition:border-color .2s}
  input:focus{outline:none;border-color:var(--frog-dark)}
  button{font-family:inherit;font-size:16px;font-weight:600;border:none;
    border-radius:14px;cursor:pointer;padding:0 22px;background:var(--ink);
    color:#fff;transition:transform .08s,opacity .2s}
  button:hover{opacity:.9}
  button:active{transform:translateY(1px)}
  button:disabled{opacity:.4;cursor:not-allowed}

  .msg{min-height:50px;display:flex;align-items:center;gap:10px;
    font-size:16px;font-weight:600;padding:13px 16px;border-radius:14px;
    margin-bottom:14px;background:var(--paper);color:var(--muted);
    transition:background .2s,color .2s}
  .msg .arrow{font-size:22px;line-height:1}
  .msg.high{background:var(--sky-soft);color:var(--sky)}
  .msg.low{background:var(--coral-soft);color:var(--coral)}
  .msg.win{background:var(--mint-soft);color:var(--mint)}
  .msg.err{background:var(--coral-soft);color:var(--coral)}
  .msg.dead{background:#ffe7e3;color:#c0392b}

  .foot{display:flex;align-items:center;justify-content:space-between;font-size:14px}
  .danger{color:var(--muted)}
  .danger strong{font-size:18px;color:var(--ink)}
  .danger.warn strong{color:var(--coral)}
  .ghost{background:transparent;color:var(--ink);
    border:2px solid var(--line);padding:10px 16px;font-size:14px}
  .ghost:hover{border-color:var(--ink);opacity:1}

  @media (prefers-reduced-motion: reduce){*{animation:none !important}}
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Игра · лягушка и аист</div>
    <h1>Угадай число</h1>
    <p class="sub">Лягушка прыгает к твоей догадке. Не угадаешь за 10 попыток — аист её схватит!</p>

    <div class="scene" id="scene">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>

      <!-- кувшинки на воде -->
      <div class="lily" style="left:8%;bottom:12px;transform:scale(.8)">
        <svg width="58" height="36" viewBox="0 0 60 40">
          <ellipse cx="30" cy="25" rx="26" ry="11" fill="#7cc48a"/>
          <ellipse cx="30" cy="23" rx="26" ry="11" fill="#9cd3a8"/>
          <path d="M30 23 L24 13 L36 13 Z" fill="var(--water)"/>
          <ellipse cx="30" cy="15" rx="3" ry="6" fill="#ffb3c7"/>
          <ellipse cx="25" cy="17" rx="3" ry="6" fill="#ff9bb6" transform="rotate(-42 25 17)"/>
          <ellipse cx="35" cy="17" rx="3" ry="6" fill="#ff9bb6" transform="rotate(42 35 17)"/>
          <circle cx="30" cy="17" r="2.6" fill="#ffd166"/>
        </svg>
      </div>
      <div class="lily" style="left:70%;bottom:8px;transform:scale(1)">
        <svg width="58" height="36" viewBox="0 0 60 40">
          <ellipse cx="30" cy="25" rx="26" ry="11" fill="#7cc48a"/>
          <ellipse cx="30" cy="23" rx="26" ry="11" fill="#9cd3a8"/>
          <path d="M30 23 L36 13 L44 18 Z" fill="var(--water)"/>
        </svg>
      </div>
      <div class="lily" style="left:46%;bottom:4px;transform:scale(.6)">
        <svg width="58" height="36" viewBox="0 0 60 40">
          <ellipse cx="30" cy="25" rx="26" ry="11" fill="#7cc48a"/>
          <ellipse cx="30" cy="23" rx="26" ry="11" fill="#9cd3a8"/>
          <path d="M30 23 L24 13 L36 13 Z" fill="var(--water)"/>
          <ellipse cx="30" cy="15" rx="3" ry="6" fill="#ffc2d4"/>
          <ellipse cx="26" cy="17" rx="3" ry="6" fill="#ffabc4" transform="rotate(-40 26 17)"/>
          <ellipse cx="34" cy="17" rx="3" ry="6" fill="#ffabc4" transform="rotate(40 34 17)"/>
          <circle cx="30" cy="17" r="2.4" fill="#ffd166"/>
        </svg>
      </div>
      <div class="lily" style="left:88%;bottom:22px;transform:scale(.55)">
        <svg width="58" height="36" viewBox="0 0 60 40">
          <ellipse cx="30" cy="25" rx="26" ry="11" fill="#7cc48a"/>
          <ellipse cx="30" cy="23" rx="26" ry="11" fill="#9cd3a8"/>
          <path d="M30 23 L22 16 L30 13 Z" fill="var(--water)"/>
        </svg>
      </div>
      <div class="lily" style="left:26%;bottom:2px;transform:scale(.6)">
        <svg width="58" height="36" viewBox="0 0 60 40">
          <ellipse cx="30" cy="25" rx="26" ry="11" fill="#7cc48a"/>
          <ellipse cx="30" cy="23" rx="26" ry="11" fill="#9cd3a8"/>
          <path d="M30 23 L34 13 L42 17 Z" fill="var(--water)"/>
        </svg>
      </div>

      <!-- аист -->
      <div class="stork-wrap" id="storkWrap">
        <div class="stork-bob" id="storkBob">
          <svg class="stork-svg" viewBox="0 0 100 80">
            <!-- ноги -->
            <line x1="60" y1="52" x2="64" y2="74" stroke="var(--leg)" stroke-width="3"/>
            <line x1="66" y1="52" x2="72" y2="74" stroke="var(--leg)" stroke-width="3"/>
            <!-- тело -->
            <ellipse cx="55" cy="44" rx="26" ry="16" fill="var(--stork)" stroke="var(--stork-line)" stroke-width="1.5"/>
            <!-- хвост -->
            <path d="M80 40 L96 34 L82 48 Z" fill="var(--stork)" stroke="var(--stork-line)" stroke-width="1.5"/>
            <!-- шея и голова -->
            <path d="M34 46 Q24 34 26 24" stroke="var(--stork)" stroke-width="9" fill="none" stroke-linecap="round"/>
            <circle cx="26" cy="22" r="9" fill="var(--stork)" stroke="var(--stork-line)" stroke-width="1.5"/>
            <circle cx="23" cy="20" r="2.2" fill="#1d2433"/>
            <!-- клюв -->
            <path d="M18 22 L2 28 L18 30 Z" fill="var(--beak)"/>
            <!-- крыло (машет) -->
            <path class="wing" d="M40 38 Q56 18 74 32 Q58 40 40 38 Z" fill="#f1f5fb" stroke="var(--stork-line)" stroke-width="1.5"/>
          </svg>
        </div>
      </div>

      <!-- лягушка -->
      <div class="frog-wrap" id="frogWrap">
        <div class="frog-hop" id="frogHop">
          <div class="frog-face" id="frogFace">
            <svg class="frog-svg" viewBox="0 0 100 100">
              <ellipse cx="50" cy="62" rx="40" ry="34" fill="var(--frog)"/>
              <ellipse cx="50" cy="74" rx="30" ry="18" fill="var(--frog-dark)" opacity=".25"/>
              <circle cx="30" cy="28" r="16" fill="var(--frog)"/>
              <circle cx="70" cy="28" r="16" fill="var(--frog)"/>
              <circle cx="30" cy="28" r="9" fill="#fff"/>
              <circle cx="70" cy="28" r="9" fill="#fff"/>
              <circle cx="32" cy="29" r="5" fill="#1d2433"/>
              <circle cx="72" cy="29" r="5" fill="#1d2433"/>
              <rect class="eye-lid" x="21" y="20" width="18" height="9" rx="4" fill="var(--frog)"/>
              <rect class="eye-lid" x="61" y="20" width="18" height="9" rx="4" fill="var(--frog)"/>
              <path d="M30 66 Q50 80 70 66" stroke="var(--frog-dark)" stroke-width="4" fill="none" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="track"></div>
      <div class="zone" id="zone"></div>
      <div class="ends"><span>1</span><span>100</span></div>
    </div>

    <div class="input-row">
      <input id="guess" type="number" min="1" max="100" placeholder="1–100" autofocus>
      <button id="check">Прыг!</button>
    </div>

    <div class="msg" id="msg">Введи число и отправь лягушку в прыжок</div>

    <div class="foot">
      <span class="danger" id="danger">Попыток: <strong id="count">0</strong> / 10</span>
      <button class="ghost" id="restart">Новая игра</button>
    </div>
  </div>

<script>
  const LIMIT = 10;                 // столько попыток до аиста
  let secret, attempts, lo, hi, finished;

  const $ = id => document.getElementById(id);
  const input = $("guess");
  const pct = v => (v - 1) / 99 * 100;   // число 1..100 -> позиция 0..100%

  // ширина дорожки с отступами, чтобы лягушка не вылезала за край
  function placeX(v){ return 6 + pct(v) * 0.88; }   // % внутри сцены

  function newGame(){
    secret = Math.floor(Math.random() * 100) + 1;
    attempts = 0; lo = 1; hi = 100; finished = false;
    $("count").textContent = 0;
    $("danger").classList.remove("warn");
    setMsg("Введи число и отправь лягушку в прыжок", "");
    // лягушка в центр, живая
    moveFrog(50, 0);
    $("frogHop").classList.remove("gulped");
    $("frogFace").style.display = "block";
    // аист наверх, в обычный режим
    const sw = $("storkWrap");
    sw.classList.remove("diving","flyaway");
    sw.style.opacity = "1";
    $("storkBob").classList.remove("dive");
    setStork(50, 0);
    clearFx();
    updateZone();
    $("check").disabled = false;
    input.value = ""; input.disabled = false; input.focus();
  }

  function setMsg(text, cls, arrow){
    const m = $("msg");
    m.className = "msg" + (cls ? " " + cls : "");
    m.innerHTML = (arrow ? '<span class="arrow">'+arrow+'</span>' : '') + text;
  }

  function updateZone(){
    $("zone").style.left = placeX(lo) + "%";
    $("zone").style.width = (placeX(hi) - placeX(lo)) + "%";
  }

  // лягушка прыгает на позицию value, смотрит в сторону dir (1 вправо, -1 влево, 0 прямо)
  function moveFrog(value, dir){
    $("frogWrap").style.left = placeX(value) + "%";
    const face = $("frogFace");
    if(dir === -1) face.classList.add("left");
    else if(dir === 1) face.classList.remove("left");
    // перезапускаем анимацию прыжка
    const hop = $("frogHop");
    hop.classList.remove("hopping");
    void hop.offsetWidth;      // приём, чтобы анимация запустилась заново
    hop.classList.add("hopping");
  }

  // аист: горизонтально над лягушкой, по высоте — тем ниже, чем больше попыток
  function setStork(value, level){
    const top = 4 + Math.min(level, 1) * 50;   // 4% .. 54%
    const sw = $("storkWrap");
    sw.style.left = placeX(value) + "%";
    sw.style.top = top + "%";
  }

  function clearFx(){
    $("scene").querySelectorAll(".heart,.tear").forEach(e => e.remove());
  }
  function spawnHearts(value){
    const N = 7;
    for(let i = 0; i < N; i++){
      const h = document.createElement("span");
      h.className = "heart"; h.textContent = "❤";
      // раскидываем сердечки кольцом вокруг лягушки
      const ang = (i / N) * Math.PI * 2;
      h.style.left = (placeX(value) + Math.cos(ang) * 7) + "%";
      h.style.bottom = (78 + Math.sin(ang) * 26) + "px";
      h.style.animationDelay = (i * 0.05) + "s";
      $("scene").appendChild(h);
      setTimeout(() => h.remove(), 1300);
    }
  }

  function win(value){
    finished = true;
    setMsg("Поймала за " + attempts + "! Аист улетел ни с чем 🎉", "win", "✓");
    moveFrog(value, 0);
    // радостные подскоки
    let n = 0;
    const joy = setInterval(() => { moveFrog(value, 0); spawnHearts(value); if(++n>=3) clearInterval(joy); }, 380);
    // аист улетает
    const sw = $("storkWrap");
    sw.classList.add("flyaway");
    sw.style.top = "-30%";
    sw.style.left = "-20%";
    setTimeout(() => sw.style.opacity = "0", 200);
    endGame();
  }

  function eaten(value){
    finished = true;
    setMsg("Аист схватил лягушку 😢 Жми «Новая игра»", "dead");
    // аист пикирует на лягушку
    const sw = $("storkWrap");
    sw.classList.add("diving");
    setStork(value, 1);
    sw.style.top = "30%";
    $("storkBob").classList.add("dive");
    // лягушку проглатывают
    setTimeout(() => { $("frogHop").classList.add("gulped"); }, 350);
    endGame();
  }

  function endGame(){
    $("check").disabled = true;
    input.disabled = true;
  }

  function check(){
    if(finished) return;
    const val = parseInt(input.value, 10);
    if(isNaN(val) || val < 1 || val > 100){
      setMsg("Нужно число от 1 до 100", "err");
      input.focus(); input.select();
      return;
    }
    attempts++;
    $("count").textContent = attempts;

    if(val === secret){
      win(val);
      input.value = "";
      return;
    }

    // неверная попытка: двигаем лягушку, опускаем аиста
    if(val < secret){
      if(val + 1 > lo) lo = val + 1;
      setMsg("Загаданное число больше", "high", "↑");
      moveFrog(val, 1);
    } else {
      if(val - 1 < hi) hi = val - 1;
      setMsg("Загаданное число меньше", "low", "↓");
      moveFrog(val, -1);
    }
    updateZone();
    setStork(val, attempts / LIMIT);

    // тревога, когда аист близко
    $("danger").classList.toggle("warn", attempts >= 7);

    // аист съедает, если попыток стало больше 10
    if(attempts > LIMIT){
      eaten(val);
    }

    input.value = ""; input.focus();
  }

  $("check").addEventListener("click", check);
  input.addEventListener("keydown", e => { if(e.key === "Enter") check(); });
  $("restart").addEventListener("click", newGame);

  newGame();
</script>
</body>
</html>
